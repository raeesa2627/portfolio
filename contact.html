<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Contact | Raeesa</title>
    <!-- Icons -->
    <link rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: "Segoe UI", system-ui, sans-serif;
      }

      :root {
        --primary: #c77dff;
        --secondary: #e0aaff;
        --dark-bg: #0a0614;
        --card-bg: #1a0e2e;
        --text-main: #ffffff;
        --text-muted: #b0b0b0;
      }

      body {
        background: linear-gradient(135deg, #0a0614 0%, #16213e 50%, #0f3460 100%);
        color: var(--text-main);
        min-height: 100vh;
        overflow-x: hidden;
      }

      /* Starry Background */
      .stars {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        pointer-events: none;
        z-index: 0;
      }

      .star {
        position: absolute;
        width: 2px;
        height: 2px;
        background: white;
        border-radius: 50%;
        animation: twinkle 3s infinite;
      }

      @keyframes twinkle {
        0%, 100% { opacity: 0.3; }
        50% { opacity: 1; }
      }

      /* Navbar */
      .navbar {
        display: flex;
        justify-content: center;
        align-items: center;
        padding: 20px 50px;
        background: rgba(10, 6, 20, 0.7);
        backdrop-filter: blur(10px);
        border-bottom: 1px solid rgba(199, 125, 255, 0.1);
        position: relative;
        z-index: 10;
      }

      .logo {
        position: absolute;
        left: 50px;
        font-size: 28px;
        font-weight: bold;
        color: var(--primary);
        background: linear-gradient(135deg, var(--primary), var(--secondary));
        background-clip: text;
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
      }

      nav {
        display: flex;
        gap: 40px;
        align-items: center;
      }

      nav a {
        display: flex;
        align-items: center;
        gap: 8px;
        text-decoration: none;
        color: var(--text-main);
        font-size: 15px;
        transition: all 0.3s ease;
        position: relative;
      }

      nav a i {
        color: var(--primary);
        font-size: 18px;
      }

      nav a::after {
        content: '';
        position: absolute;
        bottom: -5px;
        left: 0;
        width: 0;
        height: 2px;
        background: var(--primary);
        transition: width 0.3s ease;
      }

      nav a:hover::after {
        width: 100%;
      }

      /* Container */
      .container {
        max-width: 800px;
        margin: 0 auto;
        padding: 100px 40px;
        position: relative;
        z-index: 1;
        text-align: center;
      }

      h1 {
        font-size: 3em;
        margin-bottom: 60px;
        color: var(--primary);
      }

      h1 span {
        background: linear-gradient(135deg, var(--primary), var(--secondary));
        background-clip: text;
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
      }

      .contact-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
        gap: 30px;
        margin-bottom: 60px;
      }

      .contact-card {
        background: rgba(26, 14, 46, 0.8);
        border: 1px solid rgba(199, 125, 255, 0.2);
        border-radius: 15px;
        padding: 40px 30px;
        transition: all 0.3s ease;
      }

      .contact-card:hover {
        background: rgba(26, 14, 46, 1);
        border-color: var(--primary);
        transform: translateY(-5px);
        box-shadow: 0 15px 40px rgba(199, 125, 255, 0.2);
      }

      .contact-icon {
        font-size: 3em;
        color: var(--primary);
        margin-bottom: 20px;
      }

      .contact-card h3 {
        font-size: 1.3em;
        margin-bottom: 15px;
        color: var(--primary);
      }

      .contact-card p {
        color: var(--text-muted);
        font-size: 1em;
        line-height: 1.6;
      }

      .contact-card a {
        color: var(--primary);
        text-decoration: none;
        transition: all 0.3s ease;
      }

      .contact-card a:hover {
        color: var(--text-main);
        text-decoration: underline;
      }

      .social-links {
        display: flex;
        justify-content: center;
        gap: 30px;
        margin-top: 60px;
      }

      .social-link {
        width: 60px;
        height: 60px;
        display: flex;
        align-items: center;
        justify-content: center;
        background: rgba(26, 14, 46, 0.8);
        border: 2px solid rgba(199, 125, 255, 0.3);
        border-radius: 50%;
        color: var(--primary);
        font-size: 1.5em;
        transition: all 0.3s ease;
        text-decoration: none;
      }

      .social-link:hover {
        background: rgba(199, 125, 255, 0.1);
        border-color: var(--primary);
        transform: translateY(-5px);
        box-shadow: 0 10px 25px rgba(199, 125, 255, 0.2);
      }

      .back-link {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        color: var(--primary);
        text-decoration: none;
        margin-top: 30px;
        transition: all 0.3s ease;
      }

      .back-link:hover {
        gap: 12px;
      }

      @media (max-width: 768px) {
        nav {
          gap: 20px;
        }

        nav a {
          font-size: 12px;
        }

        .container {
          padding: 50px 20px;
        }

        h1 {
          font-size: 2em;
        }

        .contact-grid {
          grid-template-columns: 1fr;
        }
      }
    </style>
</head>
<body>

    <!-- Starry Background -->
    <div class="stars" id="starsContainer"></div>

    <!-- Navbar -->
    <header class="navbar">
      <div class="logo">< RT /></div>
      <nav>
        <a href="index.html"><i class="fa-solid fa-house"></i> Home</a>
        <a href="about.html"><i class="fa-solid fa-star"></i> Skills</a>
        <a href="projects.html"><i class="fa-solid fa-code"></i> Projects</a>
        <a href="experience.html"><i class="fa-solid fa-briefcase"></i> Experience</a>
        <a href="resume.pdf"><i class="fa-solid fa-file"></i> Resume</a>
        <a href="contact.html"><i class="fa-solid fa-envelope"></i> Contact</a>

    </header>

    <!-- Contact Section -->
    <div class="container">

      <div class="contact-grid">
        <!-- Email -->

          <div class="contact-icon">
            <i class="fas fa-envelope"></i>
          </div>
          <h3>Email</h3>
          <p>
            <a href="mailto:tanweerayunus27@gmail.com">tanweerayunus27@gmail.com</a>
          </p>
        </div>

        <!-- GitHub -->
        <div class="contact-card">
          <div class="contact-icon">
            <i class="fab fa-github"></i>
          </div>
          <h3>GitHub</h3>
          <p>
            <a href="https://github.com/raeesa2627" target="_blank">github.com/raeesa2627</a>
          </p>
        </div>

        <!-- LinkedIn -->
        <div class="contact-card">
          <div class="contact-icon">
            <i class="fab fa-linkedin"></i>
          </div>
          <h3>LinkedIn</h3>
          <p>
            <a href="https://linkedin.com/in/raeesa-tanweer-a-7326b3355/" target="_blank">LinkedIn Profile</a>
          </p>
        </div>
      </div>

      <!-- Social Links -->
      <div style="margin-top: 60px;">
        <h3 style="color: var(--primary); margin-bottom: 30px;">Follow Me</h3>
        <div class="social-links">
          <a href="https://github.com/raeesa2627" target="_blank" class="social-link" title="GitHub">
            <i class="fab fa-github"></i>
          </a>
          <a href="https://linkedin.com/in/raeesa-tanweer-a-7326b3355/" target="_blank" class="social-link" title="LinkedIn">
            <i class="fab fa-linkedin"></i>
          </a>
          <a href="mailto:tanweerayunus27@gmail.com" class="social-link" title="Email">
            <i class="fas fa-envelope"></i>
          </a>
        </div>
      </div>

      <a href="index.html" class="back-link">
        <i class="fas fa-arrow-left"></i> Back to Home
      </a>
    </div>

    <script>
      // Generate Random Stars
      function generateStars() {
        const starsContainer = document.getElementById('starsContainer');
        for (let i = 0; i < 100; i++) {
          const star = document.createElement('div');
          star.className = 'star';
          star.style.left = Math.random() * 100 + '%';
          star.style.top = Math.random() * 100 + '%';
          star.style.animationDelay = Math.random() * 3 + 's';
          starsContainer.appendChild(star);
        }
      }

      generateStars();
    </script>

</body>
</html>
