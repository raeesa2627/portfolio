<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Raeesa | Portfolio</title>

  <!-- Icons -->
  <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: "Segoe UI", system-ui, sans-serif;
    }

    :root {
      --primary: #c77dff;
      --secondary: #e0aaff;
      --dark-bg: #0a0614;
      --card-bg: #1a0e2e;
      --text-main: #ffffff;
      --text-muted: #b0b0b0;
      --accent: #c77dff;
    }

    body {
      background: linear-gradient(135deg, #0a0614 0%, #16213e 50%, #0f3460 100%);
      color: var(--text-main);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* Starry Background */
    .stars {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 0;
      display: block;
    }

    .star {
      position: absolute;
      width: 2px;
      height: 2px;
      background: white;
      border-radius: 50%;
      animation: twinkle 3s infinite;
    }

    @keyframes twinkle {
      0%, 100% { opacity: 0.3; }
      50% { opacity: 1; }
    }

    /* Navbar */
    .navbar {
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px 50px;
      background: rgba(10, 6, 20, 0.7);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid rgba(199, 125, 255, 0.1);
      position: relative;
      z-index: 10;
    }

    .logo {
      position: absolute;
      left: 50px;
      font-size: 24px;
      font-weight: bold;
      color: var(--primary);
      background: linear-gradient(135deg, var(--primary), var(--secondary));
      background-clip: text;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      font-style: italic;
    }

    nav {
      display: flex;
      gap: 30px;
      align-items: center;
      flex-wrap: wrap;
    }

    nav a {
      display: flex;
      align-items: center;
      gap: 8px;
      text-decoration: none;
      color: var(--text-main);
      font-size: 15px;
      transition: all 0.3s ease;
      position: relative;
    }

    nav a i {
      color: var(--primary);
      font-size: 18px;
    }

    nav a::after {
      content: '';
      position: absolute;
      bottom: -5px;
      left: 0;
      width: 0;
      height: 2px;
      background: var(--primary);
      transition: width 0.3s ease;
    }

    nav a:hover::after {
      width: 100%;
    }

    /* Hero Section */
    .hero {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 100px 50px;
      min-height: calc(100vh - 100px);
      position: relative;
      z-index: 1;
      gap: 50px;
    }

    .hero-content {
      flex: 1;
      max-width: 700px;
    }

    .greeting {
      font-size: 2.8em;
      margin-bottom: 20px;
      color: var(--text-main);
      font-weight: 600;
    }

    .greeting .emoji {
      font-size: 2.8em;
      margin-left: 10px;
      display: inline-block;
      animation: wave 0.6s ease-in-out infinite;
    }

    @keyframes wave {
      0% { transform: rotate(0deg); }
      10% { transform: rotate(14deg); }
      20% { transform: rotate(-8deg); }
      30% { transform: rotate(14deg); }
      40% { transform: rotate(-4deg); }
      50% { transform: rotate(10deg); }
      60% { transform: rotate(0deg); }
      100% { transform: rotate(0deg); }
    }

    .greeting .emoji {
      font-size: 2.8em;
      margin-left: 10px;
      display: inline-block;
      animation: wave 0.6s ease-in-out infinite;
    }

    @keyframes wave {
      0% { transform: rotate(0deg); }
      10% { transform: rotate(14deg); }
      20% { transform: rotate(-8deg); }
      30% { transform: rotate(14deg); }
      40% { transform: rotate(-4deg); }
      50% { transform: rotate(10deg); }
      60% { transform: rotate(0deg); }
      100% { transform: rotate(0deg); }
    }

    .name {
      font-size: 3.5em;
      font-weight: 900;
      margin-bottom: 10px;
      letter-spacing: -2px;
      display: none;
    }

    .name span {
      background: linear-gradient(135deg, var(--primary), var(--secondary));
      background-clip: text;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .job-title {
      font-size: 2.5em;
      color: var(--primary);
      margin: 20px 0 30px 0;
      font-weight: 700;
      min-height: 60px;
    }

    .job-title::after {
      content: '';
      animation: blink 0.7s infinite;
      margin-left: 5px;
    }

    @keyframes blink {
      0%, 50% { content: '|'; }
      51%, 100% { content: ''; }
    }

    .description {
      font-size: 1.1em;
      color: var(--text-muted);
      line-height: 1.8;
      margin-bottom: 40px;
    }

    .cta-buttons {
      display: flex;
      gap: 20px;
      flex-wrap: wrap;
    }

    .btn {
      padding: 20px 50px;
      border: none;
      border-radius: 8px;
      font-size: 1.1em;
      cursor: pointer;
      transition: all 0.3s ease;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      gap: 12px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .btn-primary {
      background: linear-gradient(135deg, var(--primary), var(--secondary));
      color: #ffffff;
    }

    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 20px 40px rgba(199, 125, 255, 0.4);
    }

    .btn-secondary {
      background: transparent;
      color: var(--primary);
      border: 2px solid var(--primary);
    }

    .btn-secondary:hover {
      background: rgba(199, 125, 255, 0.1);
      transform: translateY(-2px);
    }

    .hero-illustration {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 400px;
      position: relative;
    }

    .illustration {
      font-size: 200px;
      animation: float 3s ease-in-out infinite;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0px); }
      50% { transform: translateY(-20px); }
    }

    /* Social Icons */
    .social-icons {
      display: flex;
      gap: 20px;
      margin: 40px 0;
      flex-wrap: wrap;
    }

    .social-icon {
      width: 70px;
      height: 70px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-size: 30px;
      transition: all 0.3s ease;
      cursor: pointer;
      text-decoration: none;
    }

    .social-icon:hover {
      transform: scale(1.1);
    }

    .social-icon.github {
      background: #333333;
    }

    .social-icon.linkedin {
      background: #0077b5;
    }

    .social-icon.email {
      background: #d73d31;
    }

    .social-icon.twitter {
      background: #1da1f2;
    }

    .social-icon.codepen {
      background: #000000;
    }

    .social-icon.dev {
      background: #0a0a0a;
    }

    .social-icon.stackoverflow {
      background: #f48024;
    }
    @media (max-width: 768px) {
      .hero {
        flex-direction: column;
        padding: 50px 20px;
        text-align: center;
      }

      .name {
        font-size: 2.5em;
      }

      .job-title {
        font-size: 1.8em;
      }

      .greeting {
        font-size: 1.8em;
      }

      nav {
        gap: 20px;
      }

      nav a {
        font-size: 12px;
      }

      .avatar-container {
        width: 200px;
        height: 200px;
      }

      .avatar-content {
        font-size: 80px;
      }

      .cta-buttons {
        justify-content: center;
      }
    }
  </style>
</head>
<body>

  <script>
    // Generate Random Stars
    function generateStars() {
      const starsContainer = document.getElementById('starsContainer');
      for (let i = 0; i < 100; i++) {
        const star = document.createElement('div');
        star.className = 'star';
        star.style.left = Math.random() * 100 + '%';
        star.style.top = Math.random() * 100 + '%';
        star.style.animationDelay = Math.random() * 3 + 's';
        starsContainer.appendChild(star);
      }
    }

    generateStars();

    // Typing Effect for Job Title
    const jobTitles = [
      "Full Stack Developer",
      "AI Enthusiast"
    ];

    let titleIndex = 0;
    let charIndex = 0;
    let deleting = false;
    const jobTitleElement = document.querySelector('.job-title');

    function typeEffect() {
      const currentTitle = jobTitles[titleIndex];

      if (!deleting) {
        jobTitleElement.textContent = currentTitle.substring(0, charIndex++);
        if (charIndex > currentTitle.length) {
          deleting = true;
          setTimeout(typeEffect, 1200); // Wait before deleting
          return;
        }
      } else {
        jobTitleElement.textContent = currentTitle.substring(0, charIndex--);
        if (charIndex < 0) {
          deleting = false;
          titleIndex = (titleIndex + 1) % jobTitles.length;
          charIndex = 0;
        }
      }

      setTimeout(typeEffect, deleting ? 50 : 80);
    }

    typeEffect();
  </script>

</body>
